#version: '3.9'

x-airport-service: &airport-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - airport-net

services:
  postgres:
    image: postgres:16
    container_name: airport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: airport
      POSTGRES_USER: airport_user
      POSTGRES_PASSWORD: airport_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U airport_user -d airport']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - airport-net

  information-panel:
    <<: *airport-service
    container_name: information-panel
    command: ['/app/build/InformationPanel', '8082']
    ports:
      - '8082:8082'
    environment:
      FM_PG_HOST: postgres
      FM_PG_PORT: '5432'
      FM_PG_DB: airport
      FM_PG_USER: airport_user
      FM_PG_PASSWORD: airport_pass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8082/health']
      interval: 5s
      timeout: 3s
      retries: 20

  ticket-sales:
    <<: *airport-service
    container_name: ticket-sales
    command: ['/app/build/TicketSales', '8003']
    ports:
      - '8003:8003'
    environment:
      TICKETS_PORT: '8003'
      TICKETS_INFO_HOST: information-panel
      TICKETS_INFO_PORT: '8082'
      TICKETS_PASSENGER_HOST: passengers
      TICKETS_PASSENGER_PORT: '8004'
      TICKETS_CHECKIN_HOST: check-in
      TICKETS_CHECKIN_PORT: '8005'
      TICKETS_REQUIRE_PASSENGER_VALIDATION: '1'
      TICKETS_MAX_PER_FLIGHT: '100'
    depends_on:
      information-panel:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8003/health']
      interval: 5s
      timeout: 3s
      retries: 20

  check-in:
    <<: *airport-service
    container_name: check-in
    command: ['/app/build/CheckIn', '8005']
    ports:
      - '8005:8005'
    environment:
      CHECKIN_PORT: '8005'
      CHECKIN_INFO_HOST: information-panel
      CHECKIN_INFO_PORT: '8082'
      CHECKIN_TICKETS_HOST: ticket-sales
      CHECKIN_TICKETS_PORT: '8003'
      CHECKIN_PASSENGER_HOST: passengers
      CHECKIN_PASSENGER_PORT: '8004'
      CHECKIN_CATERING_HOST: catering-truck
      CHECKIN_CATERING_PORT: '8086'
      CHECKIN_BAGGAGE_HOST: baggage-warehouse
      CHECKIN_BAGGAGE_PORT: '8091'
    depends_on:
      information-panel:
        condition: service_healthy
      ticket-sales:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8005/health']
      interval: 5s
      timeout: 3s
      retries: 20

  passengers:
    <<: *airport-service
    container_name: passengers
    command: ['/app/build/Passengers', '8004']
    ports:
      - '8004:8004'
    environment:
      PASSENGER_PORT: '8004'
      PASSENGER_INFO_HOST: information-panel
      PASSENGER_INFO_PORT: '8082'
      PASSENGER_TICKETS_HOST: ticket-sales
      PASSENGER_TICKETS_PORT: '8003'
      PASSENGER_CHECKIN_HOST: check-in
      PASSENGER_CHECKIN_PORT: '8005'
      PASSENGER_AUTOGENERATE_INTERVAL_SEC: '0'
      PASSENGER_SELF_HOST: passengers
      PASSENGER_SELF_PORT: '8004'
    depends_on:
      information-panel:
        condition: service_healthy
      ticket-sales:
        condition: service_healthy
      check-in:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8004/health']
      interval: 5s
      timeout: 3s
      retries: 20

  followme:
    <<: *airport-service
    container_name: followme
    command: ['/app/build/FollowMe', '8083']
    ports:
      - '8083:8083'
    environment:
      GC_HOST: ground-control
      GC_PORT: '8081'
      FM_PG_HOST: postgres
      FM_PG_PORT: '5432'
      FM_PG_DB: airport
      FM_PG_USER: airport_user
      FM_PG_PASSWORD: airport_pass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8083/health']
      interval: 5s
      timeout: 3s
      retries: 20

  ground-control:
    <<: *airport-service
    container_name: ground-control
    command: ['/app/build/GroundControl', '8081']
    ports:
      - '8081:8081'
    environment:
      GC_PORT: "8081"
      GC_MAP_PATH: /app/data/airport_map.json
      INFO_HOST: information-panel
      INFO_PORT: "8082"
      FOLLOWME_HOST: followme
      FOLLOWME_PORT: "8083"
      BOARD_HOST: board
      BOARD_PORT: "8084"
      GC_ADVERTISED_HOST: ground-control
      GC_ADVERTISED_PORT: "8081"
    depends_on:
      information-panel:
        condition: service_healthy
      followme:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8081/health']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data:/app/data:ro

  board:
    <<: *airport-service
    container_name: board
    command: ['/app/build/Board', '8084']
    ports:
      - '8084:8084'
    environment:
      GC_HOST: ground-control
      GC_PORT: '8081'
      INFO_HOST: information-panel
      INFO_PORT: '8082'
      HANDLING_HOST: handling-superviser
      HANDLING_PORT: '8085'
      BOARD_PUBLIC_HOST: board
      BOARD_PORT: '8084'
    depends_on:
      ground-control:
        condition: service_healthy
      information-panel:
        condition: service_healthy
      handling-superviser:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8084/health']
      interval: 5s
      timeout: 3s
      retries: 20

  handling-superviser:
    <<: *airport-service
    container_name: handling-superviser
    command: ['/app/build/HandlingSuperviser', '8085']
    ports:
      - '8085:8085'
    environment:
      HANDLING_PORT: '8085'
      BOARD_HOST: board
      BOARD_PORT: '8084'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8085/health']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:

networks:
  airport-net:
    driver: bridge
